version: 0.2

phases:
  pre_build:
    commands:
      # Login to ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 343540011649.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      # Build Docker image
      - docker build -t brain-tasks-app .

      # Tag with version
      - docker tag brain-tasks-app:latest 343540011649.dkr.ecr.ap-south-1.amazonaws.com/brain-task:latest

  post_build:
    commands:
      # Push to ECR
      - docker push 343540011649.dkr.ecr.ap-south-1.amazonaws.com/brain-task:latest

